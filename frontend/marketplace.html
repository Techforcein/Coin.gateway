<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace · CoinVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/wallet.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/animation.css" />
  <style>
    /* ── Marketplace-specific styles ── */
    .market-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 14px;
    }
    .balance-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg,rgba(79,140,255,.15),rgba(0,224,255,.08));
      border: 1px solid rgba(79,140,255,.35);
      border-radius: 999px;
      padding: 8px 18px;
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
    }
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 36px;
    }
    .item-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      cursor: pointer;
    }
    .item-card-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .item-name {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
    }
    .item-desc {
      color: var(--text-muted);
      font-size: 13.5px;
      line-height: 1.55;
      flex: 1;
    }
    .item-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .item-price {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }
    .item-stock {
      font-size: 12px;
      color: var(--text-faint);
    }
    .item-stock.low { color: var(--warning); }
    .item-stock.out { color: var(--danger); }

    /* My codes section */
    .section-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-top: 8px;
    }
    .code-card {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 12px;
    }
    .code-info { display: flex; flex-direction: column; gap: 4px; }
    .code-item-name { font-weight: 600; font-size: 14.5px; }
    .code-date { font-size: 12px; color: var(--text-faint); }
    .code-value {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .code-copy-btn {
      background: rgba(79,140,255,.1);
      border: 1px solid rgba(79,140,255,.3);
      color: var(--primary);
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      -webkit-text-fill-color: initial;
    }
    .code-copy-btn:hover { background: rgba(79,140,255,.2); }
    .code-price { font-size: 12px; color: var(--text-faint); font-family: var(--font-mono); }

    /* Tabs */
    .market-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      width: fit-content;
    }
    .market-tab {
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: background .15s, color .15s;
    }
    .market-tab.active {
      background: linear-gradient(135deg,rgba(79,140,255,.25),rgba(0,224,255,.12));
      color: var(--text);
    }
    .market-tab:hover:not(.active) { background: rgba(255,255,255,.05); color: var(--text); }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="bg-decor"></div>
  <div class="particles"></div>
  <div class="sidebar-backdrop"></div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">CV</div>
        <div class="brand-name">CoinVault</div>
      </div>
      <a href="wallet.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 11h2"/><path d="M2 10h20"/></svg>
        Wallet
      </a>
      <a href="marketplace.html" class="nav-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Marketplace
      </a>
      <a href="history.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
        History
      </a>
      <a href="wallet-profile.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
        Profile
      </a>
      <div class="nav-spacer"></div>
      <a href="#" class="nav-link logout" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        Logout
      </a>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="flex gap-12" style="align-items:center;">
          <button class="mobile-menu-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
          <div class="topbar-title">Marketplace</div>
        </div>
        <div class="topbar-user">
          <div class="balance-badge">
            <span>¢</span>
            <span id="topbalance">0</span>
          </div>
          <div class="avatar" id="topbarAvatar">?</div>
        </div>
      </header>

      <main class="content page-transition">
        <div class="market-header">
          <div class="market-tabs">
            <div class="market-tab active" data-mtab="shopTab">🛒 Shop</div>
            <div class="market-tab" data-mtab="myCodesTab" id="myCodesTabBtn">🎟️ My Codes</div>
          </div>
        </div>

        <!-- ── Shop Tab ── -->
        <section id="shopTab">
          <div class="items-grid" id="itemsGrid">
            <!-- skeleton loading -->
            <div class="glass-card item-card">
              <div class="skeleton" style="height:48px;width:48px;border-radius:14px;"></div>
              <div class="skeleton" style="height:18px;width:60%;"></div>
              <div class="skeleton" style="height:40px;width:100%;"></div>
              <div class="item-footer">
                <div class="skeleton" style="height:24px;width:70px;"></div>
                <div class="skeleton" style="height:32px;width:80px;border-radius:8px;"></div>
              </div>
            </div>
            <div class="glass-card item-card">
              <div class="skeleton" style="height:48px;width:48px;border-radius:14px;"></div>
              <div class="skeleton" style="height:18px;width:50%;"></div>
              <div class="skeleton" style="height:40px;width:100%;"></div>
              <div class="item-footer">
                <div class="skeleton" style="height:24px;width:70px;"></div>
                <div class="skeleton" style="height:32px;width:80px;border-radius:8px;"></div>
              </div>
            </div>
          </div>
        </section>

        <!-- ── My Codes Tab ── -->
        <section id="myCodesTab" class="hidden">
          <div id="myCodesList">
            <div class="skeleton" style="height:80px;border-radius:16px;margin-bottom:12px;"></div>
            <div class="skeleton" style="height:80px;border-radius:16px;"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- ── Buy Confirmation Modal ── -->
  <div class="modal-overlay" id="buyModal">
    <div class="modal glass-card">
      <div class="modal-header">
        <h3>Confirm Purchase</h3>
        <div class="modal-close" onclick="UI.closeModal('buyModal')">✕</div>
      </div>
      <div style="margin-bottom:20px;">
        <div style="font-size:14px;color:var(--text-muted);margin-bottom:8px;">You are buying:</div>
        <div style="font-weight:700;font-size:17px;margin-bottom:14px;" id="modalItemName">—</div>
        <div style="display:flex;justify-content:space-between;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);">
          <span class="text-muted" style="font-size:14px;">Cost</span>
          <span class="mono" style="font-size:18px;font-weight:700;color:var(--accent);" id="modalItemPrice">0 credits</span>
        </div>
        <div style="margin-top:14px;font-size:13px;color:var(--text-muted);">Your balance after: <strong id="modalAfterBalance" style="color:var(--text);"></strong></div>
      </div>
      <input type="hidden" id="modalItemId" />
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="UI.closeModal('buyModal')">Cancel</button>
        <button type="button" class="btn btn-primary" id="confirmBuyBtn">Buy Now</button>
      </div>
    </div>
  </div>

  <!-- ── Purchase Success Modal ── -->
  <div class="modal-overlay" id="successModal">
    <div class="modal glass-card" style="text-align:center;">
      <div style="font-size:48px;margin-bottom:16px;">🎉</div>
      <h3 style="font-size:20px;margin-bottom:8px;">Purchase Successful!</h3>
      <p class="text-muted" style="font-size:13.5px;margin-bottom:22px;">Here is your digital code. Copy it now — it will also appear in My Codes.</p>
      <div style="background:rgba(79,140,255,.08);border:1px solid rgba(79,140,255,.3);border-radius:12px;padding:18px;margin-bottom:22px;">
        <div style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Your Code</div>
        <div class="code-value" style="justify-content:center;font-size:26px;" id="successCode">—</div>
      </div>
      <button class="btn btn-primary" id="copyCodeBtn" style="width:100%;margin-bottom:10px;">📋 Copy Code</button>
      <button class="btn btn-ghost" onclick="UI.closeModal('successModal')" style="width:100%;">Close</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/marketplace.js"></script>
</body>
</html>
