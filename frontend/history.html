<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History · CoinVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/wallet.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/animation.css" />
</head>
<body>
  <div class="bg-decor"></div>
  <div class="particles"></div>
  <div class="sidebar-backdrop"></div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">CV</div>
        <div class="brand-name">CoinVault</div>
      </div>
      <a href="wallet.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 11h2"/><path d="M2 10h20"/></svg>
        Wallet
      </a>
      <a href="history.html" class="nav-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
        History
      </a>
      <a href="wallet-profile.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
        Profile
      </a>
      <div class="nav-spacer"></div>
      <a href="#" class="nav-link logout" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        Logout
      </a>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="flex gap-12" style="align-items:center;">
          <button class="mobile-menu-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
          <div class="topbar-title">Transaction History</div>
        </div>
        <div class="topbar-user">
          <span class="text-muted mono" id="topbarUsername" style="font-size:13.5px;"></span>
          <div class="avatar" id="topbarAvatar">?</div>
        </div>
      </header>

      <main class="content page-transition">
        <div class="page-header">
          <div class="search-bar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
            <input type="text" id="searchInput" placeholder="Search by reason…" />
          </div>
        </div>

        <div class="glass-card table-card">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Reason</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="historyTbody">
              <!-- populated by JS -->
            </tbody>
          </table>
          <div class="pagination">
            <span class="pagination-info" id="paginationInfo">—</span>
            <div class="pagination-controls" id="paginationControls"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
