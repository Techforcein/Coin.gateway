<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In · CoinVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/animation.css" />
</head>
<body>
  <div class="bg-decor"></div>
  <div class="particles"></div>

  <div class="auth-wrap">
    <div class="auth-card glass-card pop-in">
      <div class="auth-brand">
        <div class="brand-mark">CV</div>
        <div class="brand-name">CoinVault</div>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Log in to view your balance and activity.</p>

      <div class="auth-error-banner" id="errorBanner"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
          <div class="field-error" id="emailError"></div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
          <div class="field-error" id="passwordError"></div>
        </div>

        <button type="submit" class="btn btn-primary auth-submit" id="submitBtn">
          <span id="submitLabel">Log in</span>
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
